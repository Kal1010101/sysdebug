name: "📝 Feedback"
description: "Tell me how you're using this script"
title: "[Feedback] "
labels: ["feedback"]
body:
  - type: markdown
    attributes:
      value: "Thanks for taking time to share your thoughts!"
  - type: input
    id: use_case
    attributes:
      label: "What are you using this script for?"
      placeholder: "e.g., hardening my homelab, production servers, etc."
  - type: dropdown
    id: helpful
    attributes:
      label: "Was this script helpful?"
      options:
        - "Very helpful"
        - "Somewhat helpful"
        - "Not helpful"
